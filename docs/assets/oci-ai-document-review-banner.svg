<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" width="1200" height="680">
<defs>
  <style>
    @keyframes fadeIn   { from { opacity:0 } to { opacity:1 } }
    @keyframes fadeInD  { from { opacity:0; transform:translateY(-8px) } to { opacity:1; transform:translateY(0) } }
    @keyframes actPulse { 0%,100%{opacity:1} 50%{opacity:.82} }
    .hdr  { animation: fadeInD .6s ease .05s both }
    .a0   { animation: fadeIn  .5s ease .1s  both }
    .a1   { animation: fadeIn  .5s ease .25s both }
    .a2   { animation: fadeIn  .4s ease .4s  both }
    .a3   { animation: fadeIn  .4s ease .5s  both }
    .a4   { animation: fadeIn  .4s ease .6s  both }
    .a5   { animation: fadeIn  .4s ease .7s  both }
    .a6   { animation: fadeIn  .4s ease .8s  both }
    .a7   { animation: fadeIn  .4s ease .9s  both }
    .a8   { animation: fadeIn  .4s ease 1.0s both }
    .a9   { animation: fadeIn  .4s ease 1.1s both }
    .b1   { animation: fadeIn  .4s ease 1.2s both }
    .b2   { animation: fadeIn  .4s ease 1.3s both }
    .b3   { animation: fadeIn  .4s ease 1.4s both }
    .b4   { animation: fadeIn  .5s ease 1.5s both }
    .b5   { animation: fadeIn  .5s ease 1.7s both }
  </style>

  <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#c74634"/>
    <stop offset="100%" stop-color="#e05540"/>
  </linearGradient>

  <filter id="fshadow" x="-3%" y="-2%" width="106%" height="108%">
    <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#00000020"/>
  </filter>
</defs>

<!-- ── PAGE BACKGROUND ── -->
<rect width="1200" height="680" fill="#e8e8e3"/>

<!-- ── TOP ORACLE RED BAR ── -->
<rect width="1200" height="4" fill="url(#rg)"/>

<!-- ── HEADER STRIP ── -->
<rect x="0" y="4" width="1200" height="52" fill="#16162a"/>

<!-- Oracle OCI circle logo -->
<g class="hdr">
  <circle cx="33" cy="30" r="17" fill="none" stroke="#c74634" stroke-width="2.5"/>
  <text x="33" y="35" text-anchor="middle"
        font-family="Arial Black,Arial,sans-serif" font-size="8" font-weight="900" fill="#c74634">OCI</text>
</g>

<!-- Header title + subtitle -->
<g class="hdr">
  <text x="60" y="24" font-family="Arial,Helvetica,sans-serif" font-size="15"
        font-weight="700" fill="#ffffff">OCI AI Document Review Portal</text>
  <text x="60" y="42" font-family="Arial,Helvetica,sans-serif" font-size="10.5" fill="#9098a9">
    Oracle Cloud AI Review Portal · Human-in-the-Loop Document Processing
  </text>
</g>

<!-- v0.6.1 version badge -->
<g class="a1">
  <rect x="1100" y="16" width="48" height="20" rx="10" fill="#c74634"/>
  <text x="1124" y="30" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="10" font-weight="700" fill="white">v0.6.1</text>
</g>

<!-- Maintainer info (right) -->
<g class="a1">
  <text x="1094" y="22" text-anchor="end" font-family="Arial,sans-serif"
        font-size="11" fill="#c6c6c6">Leandro Michelino | ACE</text>
  <text x="1094" y="39" text-anchor="end" font-family="Arial,sans-serif"
        font-size="10" fill="#8b949e">leandro.michelino@oracle.com</text>
</g>

<!-- ── PORTAL OUTER FRAME (rounded, with shadow) ── -->
<rect x="20" y="56" width="1160" height="618" rx="8" fill="white" filter="url(#fshadow)"/>

<!-- ── SIDEBAR BACKGROUND ── -->
<g class="a0">
  <rect x="20" y="56" width="190" height="618" fill="#fafaf8"/>
  <!-- Cover right-side rounded corners so sidebar looks flush at divider -->
  <rect x="182" y="56" width="28" height="618" fill="#fafaf8"/>
</g>

<!-- Sidebar / main divider -->
<line class="a0" x1="210" y1="56" x2="210" y2="674" stroke="#e0e0d8" stroke-width="1"/>

<!-- Portal outer border (drawn on top) -->
<rect x="20" y="56" width="1160" height="618" rx="8" fill="none"
      stroke="#d8d8d0" stroke-width="1"/>

<!-- ─────────────────── SIDEBAR CONTENT ─────────────────── -->

<!-- App title in sidebar -->
<g class="a2">
  <text x="31" y="77" font-family="Arial,sans-serif" font-size="12.5"
        font-weight="700" fill="#1a1a1a">OCI AI Document Review</text>
  <text x="31" y="92" font-family="Arial,sans-serif" font-size="12.5"
        font-weight="700" fill="#1a1a1a">Portal</text>
  <text x="31" y="109" font-family="Arial,sans-serif" font-size="9.5"
        fill="#888888">AI document review on OCI | v0.6.1</text>
</g>

<!-- Separator -->
<line class="a2" x1="28" y1="118" x2="206" y2="118" stroke="#e0e0d8" stroke-width="1"/>

<!-- Navigation label -->
<g class="a3">
  <text x="31" y="134" font-family="Arial,sans-serif" font-size="10.5"
        font-weight="600" fill="#888888">Navigation</text>
</g>

<!-- Upload button (default) -->
<g class="a3">
  <rect x="27" y="140" width="166" height="30" rx="6"
        fill="white" stroke="#d0d0c8" stroke-width="1"/>
  <text x="110" y="160" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="12" fill="#333333">Upload</text>
</g>

<!-- Dashboard button -->
<g class="a4">
  <rect x="27" y="176" width="166" height="30" rx="6"
        fill="white" stroke="#d0d0c8" stroke-width="1"/>
  <text x="110" y="196" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="12" fill="#333333">Dashboard</text>
</g>

<!-- Actions (73) — active, Oracle red -->
<g class="a5">
  <rect x="27" y="212" width="166" height="30" rx="6" fill="#c74634">
    <animate attributeName="opacity" values="1;.88;1" dur="2.8s" repeatCount="indefinite"/>
  </rect>
  <text x="98" y="232" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="12" font-weight="600" fill="white">Actions (73)</text>
</g>

<!-- Reviewed (31) -->
<g class="a6">
  <rect x="27" y="248" width="166" height="30" rx="6"
        fill="white" stroke="#d0d0c8" stroke-width="1"/>
  <text x="110" y="268" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="12" fill="#333333">Reviewed (31)</text>
</g>

<!-- How To Use -->
<g class="a7">
  <rect x="27" y="284" width="166" height="30" rx="6"
        fill="white" stroke="#d0d0c8" stroke-width="1"/>
  <text x="110" y="304" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="12" fill="#333333">How To Use</text>
</g>

<!-- Settings -->
<g class="a8">
  <rect x="27" y="320" width="166" height="30" rx="6"
        fill="white" stroke="#d0d0c8" stroke-width="1"/>
  <text x="110" y="340" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="12" fill="#333333">Settings</text>
</g>

<!-- Separator -->
<line class="a8" x1="28" y1="364" x2="206" y2="364" stroke="#e0e0d8" stroke-width="1"/>

<!-- GenAI region box -->
<g class="a9">
  <rect x="27" y="372" width="166" height="52" rx="6"
        fill="white" stroke="#d0d0c8" stroke-width="1"/>
  <text x="40" y="391" font-family="Arial,sans-serif" font-size="9.5"
        fill="#888888">GenAI region</text>
  <text x="40" y="410" font-family="Arial,sans-serif" font-size="13"
        font-weight="700" fill="#1a1a1a">uk-london-1</text>
</g>

<!-- Separator -->
<line class="a9" x1="28" y1="436" x2="206" y2="436" stroke="#e0e0d8" stroke-width="1"/>

<!-- Maintainer sidebar -->
<g class="a9">
  <text x="31" y="452" font-family="Arial,sans-serif" font-size="9.5"
        fill="#555555">Leandro Michelino | ACE |</text>
  <text x="31" y="467" font-family="Arial,sans-serif" font-size="9.5"
        fill="#c74634" text-decoration="underline">leandro.michelino@oracle.com</text>
  <text x="31" y="487" font-family="Arial,sans-serif" font-size="9"
        fill="#888888">For questions, new project ideas,</text>
  <text x="31" y="501" font-family="Arial,sans-serif" font-size="9"
        fill="#888888">or company needs, get in touch.</text>
</g>

<!-- ─────────────────── MAIN CONTENT: UPLOAD PAGE ─────────────────── -->

<!-- "How To Use" top-right button -->
<g class="b1">
  <rect x="1088" y="64" width="86" height="26" rx="5"
        fill="white" stroke="#d0d0c8" stroke-width="1"/>
  <text x="1131" y="81" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="11" fill="#555555">How To Use</text>
</g>

<!-- Upload heading -->
<g class="b1">
  <text x="232" y="98" font-family="Arial,sans-serif" font-size="20"
        font-weight="700" fill="#1a1a1a">Upload</text>
  <text x="232" y="117" font-family="Arial,sans-serif" font-size="11.5"
        fill="#666666">Add a document. The app queues it, processes it in OCI, then sends it to review.</text>
</g>

<!-- ── METRIC CARDS ROW ── -->
<!-- Card 1: PER-FILE LIMIT -->
<g class="b2">
  <rect x="232" y="128" width="216" height="46" rx="4"
        fill="white" stroke="#e0e0d8" stroke-width="1"/>
  <text x="247" y="146" font-family="Arial,sans-serif" font-size="8.5"
        fill="#888888" font-weight="600" letter-spacing="0.8">PER-FILE LIMIT</text>
  <text x="247" y="164" font-family="Arial,sans-serif" font-size="14"
        font-weight="700" fill="#1a1a1a">10 MB</text>
</g>

<!-- Card 2: FILES PER UPLOAD -->
<g class="b2">
  <rect x="456" y="128" width="216" height="46" rx="4"
        fill="white" stroke="#e0e0d8" stroke-width="1"/>
  <text x="471" y="146" font-family="Arial,sans-serif" font-size="8.5"
        fill="#888888" font-weight="600" letter-spacing="0.8">FILES PER UPLOAD</text>
  <text x="471" y="164" font-family="Arial,sans-serif" font-size="14"
        font-weight="700" fill="#1a1a1a">Up to 5</text>
</g>

<!-- Card 3: PARALLEL JOBS -->
<g class="b2">
  <rect x="680" y="128" width="216" height="46" rx="4"
        fill="white" stroke="#e0e0d8" stroke-width="1"/>
  <text x="695" y="146" font-family="Arial,sans-serif" font-size="8.5"
        fill="#888888" font-weight="600" letter-spacing="0.8">PARALLEL JOBS</text>
  <text x="695" y="164" font-family="Arial,sans-serif" font-size="14"
        font-weight="700" fill="#1a1a1a">5</text>
</g>

<!-- Card 4: GENAI REGION -->
<g class="b2">
  <rect x="904" y="128" width="270" height="46" rx="4"
        fill="white" stroke="#e0e0d8" stroke-width="1"/>
  <text x="919" y="146" font-family="Arial,sans-serif" font-size="8.5"
        fill="#888888" font-weight="600" letter-spacing="0.8">GENAI REGION</text>
  <text x="919" y="164" font-family="Arial,sans-serif" font-size="14"
        font-weight="700" fill="#1a1a1a">uk-london-1</text>
</g>

<!-- ── INFO BOX ── -->
<g class="b3">
  <rect x="232" y="183" width="942" height="44" rx="4"
        fill="#f0f7ff" stroke="#4a9ede" stroke-width="1.5"/>
  <text font-family="Arial,sans-serif" font-size="10" fill="#2471a3">
    <tspan x="248" y="199">Supported file types: CSV, HTM, HTML, JPEG, JPG, GIF, JSON, LOG, MD, PDF, PNG, TXT, XML, YAML, YML.</tspan>
    <tspan x="248" dy="14">Multi-file uploads need an expense name or reference so related files stay together.</tspan>
  </text>
</g>

<!-- ── FORM FIELDS ── -->
<g class="b4">
  <!-- Document type -->
  <text x="232" y="250" font-family="Arial,sans-serif" font-size="12"
        font-weight="600" fill="#1a1a1a">Document type</text>
  <rect x="232" y="258" width="942" height="34" rx="5"
        fill="white" stroke="#d0d0c8" stroke-width="1"/>
  <text x="248" y="279" font-family="Arial,sans-serif" font-size="12"
        fill="#555555">Auto-detect</text>
  <text x="1164" y="279" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="13" fill="#888888">▾</text>

  <!-- Files -->
  <text x="232" y="316" font-family="Arial,sans-serif" font-size="12"
        font-weight="600" fill="#1a1a1a">Files</text>
  <rect x="232" y="324" width="942" height="38" rx="5"
        fill="white" stroke="#d0d0c8" stroke-width="1"/>
  <!-- Upload button inside -->
  <rect x="244" y="332" width="68" height="22" rx="4"
        fill="white" stroke="#d0d0c8" stroke-width="1"/>
  <text x="278" y="347" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="11" fill="#444444">⬆ Upload</text>
  <text x="322" y="347" font-family="Arial,sans-serif" font-size="9.5"
        fill="#aaaaaa">10MB per file • CSV, HTML, JPG, JSON, LOG, MD, PDF, PNG, TXT, XML, YAML, YML</text>

  <!-- Expense name or reference -->
  <text x="232" y="386" font-family="Arial,sans-serif" font-size="12"
        font-weight="600" fill="#1a1a1a">Expense name or reference</text>
  <rect x="232" y="394" width="942" height="50" rx="5"
        fill="white" stroke="#d0d0c8" stroke-width="1"/>
  <text x="248" y="421" font-family="Arial,sans-serif" font-size="11"
        fill="#bbbbbb">Optional shared context for this upload</text>

  <!-- Notes -->
  <text x="232" y="460" font-family="Arial,sans-serif" font-size="12"
        font-weight="600" fill="#1a1a1a">Notes</text>
  <rect x="232" y="468" width="942" height="50" rx="5"
        fill="white" stroke="#d0d0c8" stroke-width="1"/>
  <text x="248" y="495" font-family="Arial,sans-serif" font-size="11"
        fill="#bbbbbb">Optional review context</text>
</g>

<!-- ── QUEUE DOCUMENT(S) BUTTON ── -->
<g class="b5">
  <rect x="232" y="532" width="942" height="38" rx="6" fill="#c74634">
    <animate attributeName="opacity" values="1;.85;1" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <text x="703" y="556" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="13" font-weight="600" fill="white">Queue Document(s)</text>
</g>

<!-- ── BOTTOM ACCENT BAR ── -->
<rect x="0" y="676" width="1200" height="4" fill="url(#rg)" opacity="0.55"/>
</svg>
