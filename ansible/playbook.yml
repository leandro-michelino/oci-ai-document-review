- name: Deploy OCI AI Document Review Portal
  hosts: doc_review
  become: true
  gather_facts: true

  vars:
    app_user: opc
    app_dir: /opt/oci-ai-document-review
    app_archive: "{{ playbook_dir }}/../.deploy/oci-ai-document-review.tar.gz"
    app_port: 8501
    oci_auth: config_file

  tasks:
    - name: Install runtime packages
      ansible.builtin.dnf:
        name:
          - python3.11
          - python3.11-pip
          - firewalld
          - tar
        state: present

    - name: Ensure firewalld is running
      ansible.builtin.service:
        name: firewalld
        state: started
        enabled: true

    - name: Open Streamlit port on host firewall
      ansible.posix.firewalld:
        port: "{{ app_port }}/tcp"
        permanent: true
        immediate: true
        state: enabled

    - name: Create app directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    - name: Unpack app release
      ansible.builtin.unarchive:
        src: "{{ app_archive }}"
        dest: "{{ app_dir }}"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"

    - name: Remove local-only files from unpacked release
      ansible.builtin.shell: |
        set -euo pipefail
        find {{ app_dir | quote }} \
          -path {{ (app_dir + '/.venv') | quote }} -prune -o \
          -path {{ (app_dir + '/.oci') | quote }} -prune -o \
          -type d \( \
            -name '.git' -o \
            -name '__pycache__' -o \
            -name '.pytest_cache' -o \
            -name '.ruff_cache' \
          \) -prune -exec rm -rf {} +
        find {{ app_dir | quote }} \
          -path {{ (app_dir + '/.venv') | quote }} -prune -o \
          -path {{ (app_dir + '/.oci') | quote }} -prune -o \
          -type f \( \
            -name '.env' -o \
            -name '.DS_Store' -o \
            -name '._*' -o \
            -name '*.pyc' -o \
            -name 'terraform.tfvars' -o \
            -name '*.tfvars' -o \
            -name '*.tfvars.json' -o \
            -name 'terraform.tfstate' -o \
            -name 'terraform.tfstate.backup' -o \
            -name '*.pem' -o \
            -name '*.key' -o \
            -name 'id_rsa*' -o \
            -name 'oci_api_key*' \
          \) -print0 | xargs -0 --no-run-if-empty rm -f
      args:
        executable: /bin/bash
      changed_when: false

    - name: Write runtime environment
      ansible.builtin.copy:
        dest: "{{ app_dir }}/.env"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0640"
        content: |
          OCI_AUTH={{ oci_auth }}
          OCI_CONFIG_FILE={{ app_dir }}/.oci/config
          OCI_PROFILE=DEFAULT
          OCI_REGION={{ oci_region }}
          GENAI_REGION={{ genai_region }}
          OCI_COMPARTMENT_ID={{ compartment_id }}
          OCI_NAMESPACE={{ object_storage_namespace }}
          OCI_BUCKET_NAME={{ bucket_name }}
          GENAI_MODEL_ID={{ genai_model_id }}
          GENAI_TEMPERATURE={{ genai_temperature | default('0.2') }}
          GENAI_MAX_TOKENS={{ genai_max_tokens | default('3000') }}
          DOCUMENT_AI_TIMEOUT_SECONDS={{ document_ai_timeout_seconds | default('180') }}
          DOCUMENT_AI_RETRY_ATTEMPTS={{ document_ai_retry_attempts | default('2') }}
          STALE_PROCESSING_MINUTES={{ stale_processing_minutes | default('12') }}
          RETENTION_DAYS={{ retention_days | default('30') }}
          MAX_PARALLEL_JOBS={{ max_parallel_jobs | default('2') }}
          MAX_DOCUMENT_CHARS={{ max_document_chars | default('50000') }}
          MAX_UPLOAD_MB={{ max_upload_mb | default('10') }}
          COMPLIANCE_ENTITIES_OBJECT_NAME={{ compliance_entities_object_name | default('compliance/public_sector_entities.csv') }}
          LOCAL_METADATA_DIR=data/metadata
          LOCAL_REPORTS_DIR=data/reports
          LOCAL_UPLOADS_DIR=data/uploads
          APP_TITLE=OCI AI Document Review Portal
          LOG_LEVEL=INFO

    - name: Create OCI config directory
      ansible.builtin.file:
        path: "{{ app_dir }}/.oci"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0700"
      when: oci_auth == "config_file"

    - name: Copy existing OCI API key from local profile
      ansible.builtin.copy:
        src: "{{ oci_api_key_file }}"
        dest: "{{ app_dir }}/.oci/oci_api_key.pem"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0600"
      when: oci_auth == "config_file"

    - name: Write OCI SDK config
      ansible.builtin.copy:
        dest: "{{ app_dir }}/.oci/config"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0600"
        content: |
          [DEFAULT]
          user={{ oci_user_id }}
          fingerprint={{ oci_fingerprint }}
          tenancy={{ oci_tenancy_id }}
          region={{ oci_region }}
          key_file={{ app_dir }}/.oci/oci_api_key.pem
      when: oci_auth == "config_file"

    - name: Create data directories
      ansible.builtin.file:
        path: "{{ app_dir }}/{{ item }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0750"
      loop:
        - data/metadata
        - data/reports
        - data/uploads

    - name: Create virtual environment
      ansible.builtin.command:
        cmd: python3.11 -m venv {{ app_dir }}/.venv
        creates: "{{ app_dir }}/.venv/bin/python"

    - name: Install Python dependencies
      ansible.builtin.pip:
        requirements: "{{ app_dir }}/requirements.txt"
        virtualenv: "{{ app_dir }}/.venv"
        virtualenv_command: python3.11 -m venv

    - name: Install systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/oci-ai-document-review.service
        mode: "0644"
        content: |
          [Unit]
          Description=OCI AI Document Review Portal
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User={{ app_user }}
          Group={{ app_user }}
          WorkingDirectory={{ app_dir }}
          EnvironmentFile={{ app_dir }}/.env
          ExecStart={{ app_dir }}/.venv/bin/streamlit run app.py --server.address=0.0.0.0 --server.port={{ app_port }} --server.headless=true
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Install local retention cleanup service
      ansible.builtin.copy:
        dest: /etc/systemd/system/oci-ai-document-review-retention.service
        mode: "0644"
        content: |
          [Unit]
          Description=Clean expired OCI AI Document Review local data

          [Service]
          Type=oneshot
          User={{ app_user }}
          Group={{ app_user }}
          WorkingDirectory={{ app_dir }}
          EnvironmentFile={{ app_dir }}/.env
          ExecStart={{ app_dir }}/.venv/bin/python scripts/cleanup_retention.py

    - name: Install local retention cleanup timer
      ansible.builtin.copy:
        dest: /etc/systemd/system/oci-ai-document-review-retention.timer
        mode: "0644"
        content: |
          [Unit]
          Description=Daily OCI AI Document Review local data retention cleanup

          [Timer]
          OnCalendar=daily
          Persistent=true

          [Install]
          WantedBy=timers.target

    - name: Enable local retention cleanup timer
      ansible.builtin.systemd_service:
        name: oci-ai-document-review-retention.timer
        state: started
        enabled: true
        daemon_reload: true

    - name: Start portal service
      ansible.builtin.systemd_service:
        name: oci-ai-document-review
        state: restarted
        enabled: true
        daemon_reload: true

    - name: Wait for app port
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ app_port }}"
        delay: 3
        timeout: 120

    - name: Show platform usage summary
      ansible.builtin.debug:
        msg:
          - "OCI AI Document Review Portal deployment complete."
          - "Portal URL: http://{{ ansible_host }}:{{ app_port }}"
          - "SSH: ssh opc@{{ ansible_host }}"
          - "App directory: {{ app_dir }}"
          - "Systemd service: oci-ai-document-review"
          - "Check service: sudo systemctl status oci-ai-document-review"
          - "Follow logs: sudo journalctl -u oci-ai-document-review -f"
          - "Restart app: sudo systemctl restart oci-ai-document-review"
          - "Runtime config: {{ app_dir }}/.env"
          - "Retention days: {{ retention_days | default('30') }}"
          - "Local metadata: {{ app_dir }}/data/metadata"
          - "Local reports: {{ app_dir }}/data/reports"
